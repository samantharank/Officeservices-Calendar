<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUB Office Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #18252d; --surface: #263746; --surface2: #2e4559; --border: #334d63;
    --text: #ffffff; --text-muted: #a8bdc8; --accent: #0678d5; --accent-hover: #00aeef;
    --team-member: #f3b921; --employee-off: #00aeef; --holiday: #3ebd3e;
    --half-day: #f3b921; --warning: #ff6b6b; --panel-width: 230px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }

  #loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; }
  #loading-overlay h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; }
  #loading-overlay h2 span { color: var(--accent); font-style: italic; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-msg { font-size: 0.85rem; color: var(--text-muted); }

  header { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--surface); border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.2rem; white-space: nowrap; }
  .logo span { color: var(--accent); font-style: italic; }
  .nav-controls { display: flex; align-items: center; gap: 5px; }
  .nav-btn { background: var(--surface2); border: 1px solid var(--accent); color: var(--text); width: 27px; height: 27px; border-radius: 5px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .nav-btn:hover { background: var(--accent); }
  #month-label { font-family: 'DM Serif Display', serif; font-size: 0.95rem; min-width: 140px; text-align: center; }
  .today-btn { background: var(--surface2); border: 1px solid var(--accent); color: var(--text-muted); padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 0.72rem; transition: all 0.15s; }
  .today-btn:hover { background: var(--accent); color: #fff; }
  .week-btn { background: var(--surface2); border: 1px solid var(--accent); color: var(--text-muted); padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 0.72rem; transition: all 0.15s; white-space: nowrap; }
  .week-btn:hover { background: var(--accent); color: #fff; }
  .view-switcher { display: flex; background: var(--surface2); border: 1px solid var(--accent); border-radius: 5px; overflow: hidden; }
  .view-btn { background: none; border: none; color: var(--text-muted); padding: 5px 11px; cursor: pointer; font-size: 0.72rem; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.15s; }
  .view-btn.active { background: var(--accent); color: #fff; font-weight: 600; }
  .rt-badge { display: flex; align-items: center; gap: 4px; font-size: 0.66rem; color: var(--text-muted); }
  .rt-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--holiday); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .search-wrap { position: relative; }
  .search-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 10px 5px 28px; border-radius: 5px; font-family: 'DM Sans', sans-serif; font-size: 0.73rem; width: 160px; transition: border-color 0.15s, width 0.2s; }
  .search-input:focus { outline: none; border-color: var(--accent); width: 200px; }
  .search-input::placeholder { color: var(--text-muted); }
  .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 0.7rem; color: var(--text-muted); pointer-events: none; }
  .search-results { position: absolute; top: calc(100% + 4px); left: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; z-index: 300; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4); min-width: 240px; }
  .search-results.show { display: block; }
  .search-result-item { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--surface2); }
  .sr-name { font-size: 0.78rem; font-weight: 500; }
  .sr-meta { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }
  .sr-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .search-empty { padding: 12px 10px; font-size: 0.75rem; color: var(--text-muted); text-align: center; }
  .add-btn { background: var(--accent); color: #fff; border: none; padding: 6px 13px; border-radius: 5px; cursor: pointer; font-size: 0.78rem; font-weight: 600; margin-left: auto; transition: background 0.15s; }
  .add-btn:hover { background: var(--accent-hover); }

  main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  .side-panel { width: var(--panel-width); min-width: var(--panel-width); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: width 0.22s ease, min-width 0.22s ease; overflow: hidden; position: relative; flex-shrink: 0; }
  .side-panel.collapsed { width: 34px; min-width: 34px; }
  .panel-toggle { position: absolute; top: 8px; right: 6px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); width: 20px; height: 20px; border-radius: 4px; cursor: pointer; font-size: 0.62rem; display: flex; align-items: center; justify-content: center; z-index: 10; transition: all 0.15s; }
  .panel-toggle:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .panel-content { padding: 8px 10px; overflow-y: auto; flex: 1; opacity: 1; transition: opacity 0.18s; padding-top: 32px; }
  .side-panel.collapsed .panel-content { opacity: 0; pointer-events: none; }
  .panel-collapsed-label { display: none; writing-mode: vertical-rl; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding-top: 40px; padding-left: 8px; }
  .side-panel.collapsed .panel-collapsed-label { display: block; }
  .panel-section { margin-bottom: 14px; }
  .panel-section-hdr { display: flex; align-items: center; justify-content: space-between; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.11em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; cursor: pointer; user-select: none; padding: 2px 0; }
  .panel-section-hdr:hover { color: var(--text); }
  .sec-arrow { font-size: 0.55rem; transition: transform 0.18s; }
  .sec-arrow.open { transform: rotate(90deg); }
  .office-list { display: flex; flex-direction: column; gap: 2px; }
  .office-item { display: flex; align-items: center; gap: 7px; padding: 3px 5px; border-radius: 5px; cursor: pointer; user-select: none; font-size: 0.73rem; transition: background 0.1s; }
  .office-item:hover { background: var(--surface2); }
  .office-item.hidden { opacity: 0.28; }
  .o-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .o-name { flex: 1; }
  .type-list { display: flex; flex-direction: column; gap: 5px; }
  .type-item { display: flex; align-items: flex-start; gap: 6px; padding: 2px 5px; }
  .t-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .t-label { font-size: 0.72rem; }
  .t-sub { font-size: 0.61rem; color: var(--text-muted); margin-top: 1px; }
  .whosoff-section { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 2px; }
  .whosoff-date { font-family: 'DM Serif Display', serif; font-size: 0.92rem; margin-bottom: 8px; }
  .whosoff-empty { color: var(--text-muted); font-size: 0.75rem; font-style: italic; text-align: center; padding: 10px 0; }
  .wo-group { margin-bottom: 9px; }
  .wo-group-title { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 4px; padding-bottom: 3px; border-bottom: 1px solid var(--border); }
  .wo-entry { display: flex; align-items: flex-start; gap: 5px; padding: 3px; border-radius: 4px; cursor: pointer; transition: background 0.1s; }
  .wo-entry:hover { background: var(--surface2); }
  .wo-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .wo-name { font-size: 0.75rem; font-weight: 500; }
  .wo-type { font-size: 0.63rem; color: var(--text-muted); margin-top: 1px; }
  .wo-backup { font-size: 0.62rem; color: var(--accent-hover); margin-top: 1px; }
  .wo-fwd { font-size: 0.62rem; color: var(--team-member); margin-top: 1px; }
  .wo-half { display: inline-block; font-size: 0.49rem; background: var(--half-day); color: #000; border-radius: 2px; padding: 0 3px; font-weight: 700; margin-left: 3px; vertical-align: middle; }
  .day-add-btn { background: none; border: 1px dashed var(--border); color: var(--text-muted); width: 100%; padding: 5px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; font-family: 'DM Sans', sans-serif; margin-top: 5px; transition: all 0.15s; }
  .day-add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .calendar-wrap { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; }
  .calendar-wrap.week-mode, .calendar-wrap.today-mode { overflow: hidden; }

  /* ── TODAY VIEW ── */
  .today-view { display: flex; flex-direction: column; gap: 14px; padding: 4px 0; overflow-y: auto; height: 100%; }
  .today-header { margin-bottom: 2px; }
  .today-headline { font-family: 'DM Serif Display', serif; font-size: 1.8rem; }
  .today-headline span { color: var(--accent); font-style: italic; }
  .today-subline { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
  .today-summary { display: flex; gap: 10px; flex-wrap: wrap; }
  .summary-pill { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 0.75rem; }
  .summary-pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .summary-pill-count { font-weight: 700; font-size: 1rem; }
  .summary-pill-label { color: var(--text-muted); }
  .today-no-entries { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--text-muted); padding: 40px 0; }
  .today-no-entries .big-icon { font-size: 3rem; }
  .today-no-entries p { font-size: 0.9rem; }
  .today-holiday-banner { background: rgba(62,189,62,0.12); border: 1px solid rgba(62,189,62,0.3); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
  .today-holiday-icon { font-size: 1.6rem; }
  .today-holiday-name { font-size: 0.95rem; font-weight: 600; color: var(--holiday); }
  .today-holiday-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
  .today-office-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .today-office-header { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid var(--border); }
  .today-office-color { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
  .today-office-name { font-size: 0.9rem; font-weight: 600; flex: 1; }
  .today-office-count { font-size: 0.72rem; color: var(--text-muted); background: var(--surface2); border-radius: 10px; padding: 2px 8px; }
  .today-entry-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; cursor: pointer; }
  .today-entry-row:last-child { border-bottom: none; }
  .today-entry-row:hover { background: var(--surface2); }
  .today-entry-type-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .today-entry-info { flex: 1; }
  .today-entry-name { font-size: 0.88rem; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .today-entry-half { font-size: 0.58rem; background: var(--team-member); color: #000; border-radius: 3px; padding: 1px 5px; font-weight: 700; }
  .today-entry-type { font-size: 0.73rem; color: var(--text-muted); margin-top: 2px; }
  .today-entry-dates { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
  .today-entry-backup { font-size: 0.72rem; color: var(--accent-hover); margin-top: 2px; }
  .today-entry-fwd { font-size: 0.72rem; color: var(--team-member); margin-top: 2px; }
  .today-entry-note { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; font-style: italic; }

  /* ── Month view with spanning + expanding ── */
  .cal-month { display: flex; flex-direction: column; gap: 4px; }
  .day-headers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 2px; }
  .day-hdr { text-align: center; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-muted); padding: 4px 0 6px; }
  .week-row { position: relative; margin-bottom: 4px; }
  .week-cells { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .day-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 5px; cursor: pointer; transition: border-color 0.12s; }
  .day-cell:hover { border-color: var(--accent); }
  .day-cell.today { border-color: var(--team-member); border-width: 2px; }
  .day-cell.today .day-num { color: var(--team-member); font-weight: 700; }
  .day-cell.selected { border-color: var(--accent); border-width: 2px; background: rgba(6,120,213,0.07); }
  .day-cell.other-month { opacity: 0.2; }
  .day-num { font-size: 0.74rem; font-weight: 600; color: var(--text-muted); }
  .week-events { position: absolute; top: 0; left: 0; right: 0; pointer-events: none; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding-top: 22px; }
  .span-chip { pointer-events: all; display: flex; align-items: center; gap: 4px; padding: 3px 7px; border-radius: 4px; font-size: 0.67rem; font-weight: 600; cursor: pointer; border-left: 4px solid transparent; overflow: hidden; white-space: nowrap; height: 22px; margin-bottom: 2px; transition: filter 0.12s; align-self: start; }
  .span-chip:hover { filter: brightness(1.2); }
  .span-chip.cont-right { border-radius: 4px 0 0 4px; margin-right: -2px; }
  .span-chip.cont-left  { border-radius: 0 4px 4px 0; margin-left: -2px; padding-left: 5px; }
  .span-chip.cont-both  { border-radius: 0; margin-left: -2px; margin-right: -2px; padding-left: 5px; }
  .chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .chip-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .chip-half { font-size: 0.49rem; background: var(--half-day); color: #000; border-radius: 2px; padding: 0 3px; font-weight: 700; flex-shrink: 0; }
  .chip-office-tag { font-size: 0.58rem; font-weight: 400; opacity: 0.8; }

  /* ── Week view ── */
  .week-wrap { display: flex; flex-direction: column; height: 100%; }
  .week-hdrs { display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; }
  .week-grid { flex: 1; display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; min-height: 0; }
  .week-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; height: 100%; overflow-y: auto; padding: 6px; cursor: pointer; transition: border-color 0.12s; }
  .week-cell:hover { border-color: var(--accent); }
  .week-cell.today { border-color: var(--team-member); border-width: 2px; }
  .week-cell.today .wc-day-num { color: var(--team-member); font-weight: 700; }
  .week-cell.selected { border-color: var(--accent); border-width: 2px; background: rgba(6,120,213,0.07); }
  .wc-day-num { font-size: 0.74rem; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
  .week-chip { display: flex; flex-direction: column; padding: 4px 6px 4px 8px; border-radius: 5px; margin-bottom: 3px; cursor: pointer; background: rgba(255,255,255,0.05); border-left: 4px solid transparent; transition: filter 0.12s; }
  .week-chip:hover { filter: brightness(1.18); background: rgba(255,255,255,0.09); }
  .wc-row1 { display: flex; align-items: center; gap: 4px; }
  .wc-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .wc-name { font-size: 0.68rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .wc-half { font-size: 0.49rem; background: var(--half-day); color: #000; border-radius: 2px; padding: 0 3px; font-weight: 700; }
  .wc-row2 { display: flex; align-items: center; gap: 4px; margin-top: 1px; padding-left: 9px; flex-wrap: wrap; }
  .wc-office { font-size: 0.6rem; font-weight: 500; }
  .wc-backup { font-size: 0.59rem; color: var(--accent-hover); }
  .wc-backup::before { content: '↩ '; }
  .wc-fwd { font-size: 0.59rem; color: var(--team-member); }
  .wc-fwd::before { content: '📞 '; }

  .saving-indicator { position: fixed; bottom: 18px; right: 18px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 13px; font-size: 0.75rem; color: var(--text-muted); display: none; align-items: center; gap: 7px; z-index: 150; }
  .saving-indicator.show { display: flex; }
  .saving-indicator.success { border-color: var(--holiday); color: var(--holiday); }
  .saving-indicator.error { border-color: var(--warning); color: var(--warning); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px; width: 450px; max-width: 96vw; max-height: 90vh; overflow-y: auto; animation: up 0.17s ease; }
  @keyframes up { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.18rem; margin-bottom: 15px; }
  .form-row { margin-bottom: 11px; }
  .form-row label { display: block; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
  .form-row label .sub { font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 0.65rem; }
  .form-row select, .form-row input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.81rem; appearance: none; transition: border-color 0.15s; }
  .form-row select:focus, .form-row input:focus { outline: none; border-color: var(--accent); }
  .half-toggle { display: flex; align-items: center; gap: 9px; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; user-select: none; transition: all 0.15s; }
  .half-toggle:hover { border-color: var(--half-day); }
  .half-toggle.active { border-color: var(--half-day); background: rgba(243,185,33,0.07); }
  .tog-sw { width: 28px; height: 16px; background: var(--border); border-radius: 8px; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .tog-sw::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: var(--text-muted); transition: transform 0.2s, background 0.2s; }
  .half-toggle.active .tog-sw { background: var(--half-day); }
  .half-toggle.active .tog-sw::after { transform: translateX(12px); background: #000; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 15px; }
  .btn-c { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 7px 14px; border-radius: 5px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; }
  .btn-s { background: var(--accent); color: #fff; border: none; padding: 7px 17px; border-radius: 5px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600; }
  .btn-s:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-d { background: transparent; border: 1px solid var(--warning); color: var(--warning); padding: 7px 12px; border-radius: 5px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; margin-right: auto; }
  .btn-d:disabled { opacity: 0.5; cursor: not-allowed; }

  @media (max-width: 768px) {
    .side-panel, .week-btn, .search-wrap { display: none; }
    header { padding: 10px 12px; }
    .calendar-wrap { padding: 8px; }
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <h2>HUB <span>Office Calendar</span></h2>
  <div class="spinner"></div>
  <div id="loading-msg">Connecting…</div>
</div>

<header>
  <div class="logo">HUB <span>Office Calendar</span></div>
  <div class="nav-controls">
    <button class="nav-btn" id="prev-btn">‹</button>
    <span id="month-label"></span>
    <button class="nav-btn" id="next-btn">›</button>
    <button class="today-btn" id="today-nav-btn">Today</button>
    <button class="week-btn" id="week-btn">📅 This Week</button>
  </div>
  <div class="view-switcher">
    <button class="view-btn active" data-view="today">Today</button>
    <button class="view-btn" data-view="month">Month</button>

function fmtD(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function getMondayOf(date) { const d=new Date(date); const day=d.getDay(); d.setDate(d.getDate()+(day===0?-6:1-day)); return d; }
function hexToRgb(hex) { return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`; }

function eventsOn(dk) {
  return events.filter(e => {
    if (!e.entry_type) return false;
    if (e.entry_type==='holiday' && e.office==='all') { const end=e.end_date||e.entry_date; return dk>=e.entry_date&&dk<=end; }
    if (hiddenOffices.has(e.office)) return false;
    const end=e.end_date||e.entry_date; return dk>=e.entry_date&&dk<=end;
  });
}

function showSaving(msg,type) {

async function loadEvents() { const {data,error}=await sb.from(TABLE).select('*').order('entry_date'); if(error) throw error; events=data||[]; }
async function createEvent(ev) { const {data,error}=await sb.from(TABLE).insert([ev]).select().single(); if(error) throw error; return data; }
async function updateEvent(id,ev) { const {error}=await sb.from(TABLE).update(ev).eq('id',id); if(error) throw error; }
async function deleteEvent(id) { const {error}=await sb.from(TABLE).delete().eq('id',id); if(error) throw error; }

function subscribeRealtime() {
  sb.channel('hub_calendar_changes')
    .on('postgres_changes',{event:'*',schema:'public',table:TABLE},payload=>{
      const {eventType,new:newRow,old:oldRow}=payload;
      if(eventType==='INSERT'){if(!events.find(e=>e.id===newRow.id))events.push(newRow);}
      else if(eventType==='UPDATE'){const idx=events.findIndex(e=>e.id===newRow.id);if(idx>=0)events[idx]=newRow;else events.push(newRow);}
      else if(eventType==='DELETE'){events=events.filter(e=>e.id!==oldRow.id);}
      renderView(); if(selectedDay) refreshWhoPanel();
    }).subscribe();
}

function renderView() {

  else {
    const end=new Date(weekStart); end.setDate(end.getDate()+4);
    label.textContent=weekStart.getMonth()===end.getMonth()?`${MONTHS[weekStart.getMonth()]} ${weekStart.getDate()}–${end.getDate()}, ${end.getFullYear()}`:`${MONTHS[weekStart.getMonth()]} ${weekStart.getDate()} – ${MONTHS[end.getMonth()]} ${end.getDate()}, ${end.getFullYear()}`;
  }
}

// ── TODAY VIEW ─────────────────────────────────────────────────
function renderToday() {
  const wrap=document.getElementById('cal-wrap'); wrap.innerHTML='';
  const todayEvs=eventsOn(todayKey);
  const holidays=todayEvs.filter(e=>e.entry_type==='holiday');
  const teamOff=todayEvs.filter(e=>e.entry_type==='team-member');
  const empOff=todayEvs.filter(e=>e.entry_type==='employee-off');
  const container=document.createElement('div'); container.className='today-view';

  const hdr=document.createElement('div'); hdr.className='today-header';
  const officeCount=new Set(todayEvs.filter(e=>e.office!=='all').map(e=>e.office)).size;
  hdr.innerHTML=`<div class="today-headline">${DAYS_FULL[today.getDay()]}, <span>${MONTHS[today.getMonth()]} ${today.getDate()}</span></div><div class="today-subline">${todayEvs.length===0?'Everyone is in today 🎉':`${todayEvs.length} absence${todayEvs.length!==1?'s':''} across ${officeCount} office${officeCount!==1?'s':''} today`}</div>`;
  container.appendChild(hdr);

  if(todayEvs.length>0) {
    const summary=document.createElement('div'); summary.className='today-summary';
    if(holidays.length) summary.innerHTML+=`<div class="summary-pill"><div class="summary-pill-dot" style="background:var(--holiday)"></div><span class="summary-pill-count">${holidays.length}</span><span class="summary-pill-label">Holiday</span></div>`;
    if(teamOff.length)  summary.innerHTML+=`<div class="summary-pill"><div class="summary-pill-dot" style="background:var(--team-member)"></div><span class="summary-pill-count">${teamOff.length}</span><span class="summary-pill-label">Team Member${teamOff.length!==1?'s':''} Off</span></div>`;
    if(empOff.length)   summary.innerHTML+=`<div class="summary-pill"><div class="summary-pill-dot" style="background:var(--employee-off)"></div><span class="summary-pill-count">${empOff.length}</span><span class="summary-pill-label">Employee${empOff.length!==1?'s':''} Off</span></div>`;
    container.appendChild(summary);
  }

  if(todayEvs.length===0) {
    const empty=document.createElement('div'); empty.className='today-no-entries';
    empty.innerHTML=`<div class="big-icon">✅</div><p>No absences today — everyone is in!</p>`;
    container.appendChild(empty);
  } else {
    holidays.forEach(ev=>{ const banner=document.createElement('div'); banner.className='today-holiday-banner'; banner.innerHTML=`<div class="today-holiday-icon">🎉</div><div><div class="today-holiday-name">${ev.holiday_name||'Holiday'}</div><div class="today-holiday-sub">Applies to all offices</div></div>`; container.appendChild(banner); });
    OFFICES.forEach(o=>{
      const offEvs=todayEvs.filter(e=>e.office===o.id); if(!offEvs.length) return;
      const section=document.createElement('div'); section.className='today-office-section';
      section.innerHTML=`<div class="today-office-header"><div class="today-office-color" style="background:${o.color}"></div><span class="today-office-name">${o.name}</span><span class="today-office-count">${offEvs.length} absence${offEvs.length!==1?'s':''}</span></div>`;
      offEvs.forEach(ev=>{
        const color=TYPE_COLOR[ev.entry_type];
        const dateStr=ev.end_date&&ev.end_date!==ev.entry_date?`${ev.entry_date} → ${ev.end_date}`:ev.entry_date;
        const row=document.createElement('div'); row.className='today-entry-row';
        row.innerHTML=`<div class="today-entry-type-dot" style="background:${color}"></div><div class="today-entry-info"><div class="today-entry-name">${ev.entry_name||TYPE_LABEL[ev.entry_type]}${ev.half_day?'<span class="today-entry-half">½ Day</span>':''}</div><div class="today-entry-type">${TYPE_LABEL[ev.entry_type]}</div><div class="today-entry-dates">📅 ${dateStr}</div>${ev.backup?`<div class="today-entry-backup">↩ Backup: ${ev.backup}</div>`:''}${ev.forward_to?`<div class="today-entry-fwd">📞 Forward to: ${ev.forward_to}</div>`:''}${ev.note?`<div class="today-entry-note">${ev.note}</div>`:''}</div>`;
        row.addEventListener('click',()=>openEdit(ev.id));
        section.appendChild(row);
      });
      container.appendChild(section);
    });
  }
  wrap.appendChild(container);
}

// ── Month view ─────────────────────────────────────────────────
function renderMonth() {
  const wrap=document.getElementById('cal-wrap'); wrap.innerHTML='';
  const cal=document.createElement('div'); cal.className='cal-month';
  const hdrs=document.createElement('div'); hdrs.className='day-headers';
  DAYS_MON.forEach(d=>{const h=document.createElement('div');h.className='day-hdr';h.textContent=d;hdrs.appendChild(h);});
  cal.appendChild(hdrs);
  const firstDow=new Date(curYear,curMonth,1).getDay();
  const offset=firstDow===0?1:firstDow===1?0:-(firstDow-1);
  for(let week=0;week<6;week++){
    const weekDates=[]; let hasMain=false;
    for(let dow=0;dow<5;dow++){
      const date=new Date(curYear,curMonth,1+offset+week*7+dow);
      weekDates.push({y:date.getFullYear(),m:date.getMonth(),d:date.getDate(),other:date.getMonth()!==curMonth});
      if(!weekDates[dow].other) hasMain=true;
    }
    if(!hasMain&&week>3) break;
    const weekRow=document.createElement('div'); weekRow.className='week-row';
    const cells=document.createElement('div'); cells.className='week-cells';
    weekDates.forEach(wd=>{
      const dk=fmtD(wd.y,wd.m,wd.d);
      const cell=document.createElement('div');
      cell.className='day-cell'+(wd.other?' other-month':'')+(dk===todayKey?' today':'')+(dk===selectedDay?' selected':'');
      cell.innerHTML=`<div class="day-num">${wd.d}</div>`;
      cell.addEventListener('click',()=>selectDay(dk,wd.y,wd.m,wd.d));
      cell.addEventListener('dblclick',()=>openAdd(dk));
      cells.appendChild(cell);
    });
    weekRow.appendChild(cells);
    const {overlay,slotCount}=buildWeekEvents(weekDates);
    const rowH=Math.max(52,22+slotCount*24+8);
    cells.querySelectorAll('.day-cell').forEach(c=>c.style.minHeight=rowH+'px');
    overlay.style.height=rowH+'px';
    weekRow.appendChild(overlay);
    cal.appendChild(weekRow);
  }
  wrap.appendChild(cal);
}

function buildWeekEvents(weekDates) {
  const overlay=document.createElement('div'); overlay.className='week-events';
  const wS=fmtD(weekDates[0].y,weekDates[0].m,weekDates[0].d);
  const wE=fmtD(weekDates[4].y,weekDates[4].m,weekDates[4].d);
  const weekEvs=events.filter(e=>{
    if(!e.entry_type) return false;
    if(hiddenOffices.has(e.office)&&!(e.entry_type==='holiday'&&e.office==='all')) return false;
    return e.entry_date<=wE&&(e.end_date||e.entry_date)>=wS;
  }).sort((a,b)=>{
    const aL=(new Date(a.end_date||a.entry_date)-new Date(a.entry_date))/86400000;
    const bL=(new Date(b.end_date||b.entry_date)-new Date(b.entry_date))/86400000;
    return bL!==aL?bL-aL:a.entry_date.localeCompare(b.entry_date);
  });
  const slots=[0,0,0,0,0]; let maxSlot=0;
  weekEvs.forEach(ev=>{
    const es=ev.entry_date,ee=ev.end_date||ev.entry_date;
    let sc=-1,ec=-1;
    weekDates.forEach((wd,i)=>{const dk=fmtD(wd.y,wd.m,wd.d);if(dk>=es&&dk<=ee){if(sc===-1)sc=i;ec=i;}});
    if(sc===-1) return;
    const span=ec-sc+1,tColor=TYPE_COLOR[ev.entry_type]||'#888',office=OFFICES.find(o=>o.id===ev.office),oColor=office?office.color:tColor,borderColor=ev.entry_type==='holiday'?tColor:oColor;
    const slotRow=Math.max(...slots.slice(sc,ec+1)); if(slotRow+1>maxSlot) maxSlot=slotRow+1;
    const cL=es<wS,cR=ee>wE&&ec===4;
    const chip=document.createElement('div');
    chip.className='span-chip'+(cL&&cR?' cont-both':(!cL&&cR?' cont-right':(cL&&!cR?' cont-left':'')));
    chip.style.cssText=`grid-column:${sc+1}/span ${span};grid-row:${slotRow+1};border-left-color:${borderColor};color:${tColor};background:rgba(${hexToRgb(tColor)},0.15);`;
    const dn=ev.entry_type==='holiday'?(ev.holiday_name||'Holiday'):(ev.entry_name||TYPE_LABEL[ev.entry_type]);
    chip.innerHTML=`<div class="chip-dot" style="background:${tColor}"></div><span class="chip-name">${dn}</span>${ev.half_day?'<span class="chip-half">½</span>':''}${span===1&&office?`<span class="chip-office-tag" style="color:${oColor}">${office.name}</span>`:''}`;
    chip.addEventListener('click',e=>{e.stopPropagation();openEdit(ev.id);});
    overlay.appendChild(chip);
    for(let i=sc;i<=ec;i++) slots[i]=slotRow+1;
  });
  return {overlay,slotCount:maxSlot};
}

// ── Week view ──────────────────────────────────────────────────
function renderWeek() {
  const wrap=document.getElementById('cal-wrap'); wrap.innerHTML=''; wrap.classList.add('week-mode');
  const ww=document.createElement('div'); ww.className='week-wrap';
  const hdrs=document.createElement('div'); hdrs.className='week-hdrs';
  const wg=document.createElement('div'); wg.className='week-grid';
  for(let i=0;i<5;i++){
    const d=new Date(weekStart); d.setDate(d.getDate()+i);
    const dk=fmtD(d.getFullYear(),d.getMonth(),d.getDate());
    const hdr=document.createElement('div'); hdr.className='day-hdr'; hdr.textContent=`${DAYS_MON[i]} ${d.getDate()}`; hdrs.appendChild(hdr);
    const cell=document.createElement('div');
    cell.className='week-cell'+(dk===todayKey?' today':'')+(dk===selectedDay?' selected':'');
    cell.innerHTML=`<div class="wc-day-num">${d.getDate()}</div>`;
    eventsOn(dk).forEach(ev=>cell.appendChild(buildWeekChip(ev)));
    cell.addEventListener('click',e=>{if(e.target.closest('.week-chip'))return;selectDay(dk,d.getFullYear(),d.getMonth(),d.getDate());});
    cell.addEventListener('dblclick',e=>{if(e.target.closest('.week-chip'))return;openAdd(dk);});
    cell.querySelectorAll('.week-chip').forEach(c=>c.addEventListener('click',e=>{e.stopPropagation();openEdit(c.dataset.evid);}));
    wg.appendChild(cell);
  }
  ww.appendChild(hdrs); ww.appendChild(wg); wrap.appendChild(ww);
}

function buildWeekChip(ev) {
  const office=OFFICES.find(o=>o.id===ev.office),tColor=TYPE_COLOR[ev.entry_type]||'#888',oColor=office?office.color:'#555';
  const chip=document.createElement('div'); chip.className='week-chip'; chip.dataset.evid=ev.id;
  chip.style.borderLeftColor=ev.entry_type==='holiday'?tColor:oColor; chip.style.color=tColor;
  const r1=document.createElement('div'); r1.className='wc-row1';
  r1.innerHTML=`<div class="wc-dot" style="background:${tColor}"></div>`;
  const nm=document.createElement('span'); nm.className='wc-name'; nm.textContent=ev.entry_type==='holiday'?(ev.holiday_name||'Holiday'):(ev.entry_name||TYPE_LABEL[ev.entry_type]); r1.appendChild(nm);
  if(ev.half_day) r1.innerHTML+=`<span class="wc-half">½</span>`;
  chip.appendChild(r1);
  const r2=document.createElement('div'); r2.className='wc-row2';
  if(ev.entry_type==='holiday'){r2.innerHTML=`<span class="wc-office" style="color:var(--holiday)">All Offices</span>`;}
  else if(office){r2.innerHTML=`<span class="wc-office" style="color:${oColor}">${office.name}</span>`;if(ev.backup)r2.innerHTML+=`<span class="wc-backup">${ev.backup}</span>`;if(ev.forward_to)r2.innerHTML+=`<span class="wc-fwd">${ev.forward_to}</span>`;}
  chip.appendChild(r2); return chip;
}

// ── Who's Off panel ────────────────────────────────────────────
function selectDay(dk,y,m,d) {
  selectedDay=dk; if(curView==='month') renderMonth();
  document.getElementById('wo-date').textContent=new Date(y,m,d).toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'});
  renderWhoPanel(dk);
  const btn=document.getElementById('day-add-btn'); btn.style.display=''; btn.onclick=()=>openAdd(dk);
}
function refreshWhoPanel() {
  if(!selectedDay) return;
  const [y,m,d]=selectedDay.split('-').map(Number);
  renderWhoPanel(selectedDay);
  document.getElementById('wo-date').textContent=new Date(y,m-1,d).toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'});
}
function renderWhoPanel(dk) {
  const content=document.getElementById('wo-entries'); content.innerHTML='';
  const dayEvs=eventsOn(dk);
  if(!dayEvs.length){content.innerHTML='<div class="whosoff-empty">No entries for this day.</div>';return;}
  const hols=dayEvs.filter(e=>e.entry_type==='holiday');
  if(hols.length){const g=makeWOGroup('All Offices','#3ebd3e');hols.forEach(ev=>g.appendChild(makeWOEntry(ev,'#3ebd3e')));content.appendChild(g);}
  OFFICES.forEach(o=>{const evs=dayEvs.filter(e=>e.office===o.id);if(!evs.length)return;const g=makeWOGroup(o.name,o.color);evs.forEach(ev=>g.appendChild(makeWOEntry(ev,TYPE_COLOR[ev.entry_type])));content.appendChild(g);});
}
function makeWOGroup(title,color){const g=document.createElement('div');g.className='wo-group';const t=document.createElement('div');t.className='wo-group-title';t.style.color=color;t.textContent=title;g.appendChild(t);return g;}
function makeWOEntry(ev,color){
  const row=document.createElement('div');row.className='wo-entry';
  row.innerHTML=`<div class="wo-dot" style="background:${color}"></div><div><div class="wo-name">${ev.entry_type==='holiday'?(ev.holiday_name||'Holiday'):(ev.entry_name||TYPE_LABEL[ev.entry_type])}${ev.half_day?'<span class="wo-half">½</span>':''}</div><div class="wo-type">${TYPE_LABEL[ev.entry_type]}${ev.note?' · '+ev.note:''}</div>${ev.backup?`<div class="wo-backup">↩ Backup: ${ev.backup}</div>`:''}${ev.forward_to?`<div class="wo-fwd">📞 Fwd to: ${ev.forward_to}</div>`:''}</div>`;
  row.addEventListener('click',()=>openEdit(ev.id)); return row;
}

// ── Search ─────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase(),results=document.getElementById('search-results');
  if(!q){results.classList.remove('show');return;}
  const matches=events.filter(e=>(e.entry_name||e.holiday_name||'').toLowerCase().includes(q));
  results.innerHTML='';
  if(!matches.length){results.innerHTML='<div class="search-empty">No results found</div>';}
  else{matches.slice(0,8).forEach(ev=>{
    const office=OFFICES.find(o=>o.id===ev.office),color=TYPE_COLOR[ev.entry_type]||'#888',oColor=office?office.color:'#888';
    const item=document.createElement('div');item.className='search-result-item';
    item.innerHTML=`<div class="sr-name"><span class="sr-dot" style="background:${color}"></span>${ev.entry_type==='holiday'?(ev.holiday_name||'Holiday'):(ev.entry_name||'')}</div><div class="sr-meta"><span style="color:${oColor}">${office?office.name:'All Offices'}</span> · ${TYPE_LABEL[ev.entry_type]} · ${ev.entry_date}</div>`;
    item.addEventListener('click',()=>{const [y,m,d]=ev.entry_date.split('-').map(Number);curYear=y;curMonth=m-1;curView='month';document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));document.querySelector('[data-view="month"]').classList.add('active');results.classList.remove('show');document.getElementById('search-input').value='';renderView();setTimeout(()=>selectDay(ev.entry_date,y,m-1,d),50);});
    results.appendChild(item);
  });}
  results.classList.add('show');
});
document.addEventListener('click',e=>{if(!document.getElementById('search-wrap').contains(e.target))document.getElementById('search-results').classList.remove('show');});

// ── Modal ──────────────────────────────────────────────────────
function closeAll(){document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open'));}
function setHalf(val){halfActive=val;document.getElementById('half-toggle').classList.toggle('active',val);}
function syncForm(){
  const type=document.getElementById('entry-type').value,isHol=type==='holiday',isEmp=type==='employee-off';
  document.getElementById('name-row').style.display=isHol?'none':'';
  document.getElementById('backup-row').style.display=isEmp?'':'none';
  document.getElementById('forward-row').style.display=isEmp?'':'none';
  document.getElementById('holiday-row').style.display=isHol?'':'none';
  document.getElementById('office-row').style.display=isHol?'none':'';
  document.getElementById('name-lbl').textContent=type==='team-member'?'Team Member Name':'Employee Name';
}
function openAdd(prefillDate){
  prefillDate=prefillDate||'';editingId=null;
  document.getElementById('modal-title').textContent='Add Entry';
  document.getElementById('del-btn').style.display='none';
  document.getElementById('entry-type').value='team-member';
  document.getElementById('entry-office').value=OFFICES[0].id;
  ['entry-name','entry-backup','entry-forward','entry-holiday-name','entry-end-date','entry-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('entry-date').value=prefillDate;
  document.getElementById('save-btn').disabled=false;
  setHalf(false);syncForm();
  document.getElementById('event-modal').classList.add('open');
}
function openEdit(evId){
  const ev=events.find(e=>e.id===evId);if(!ev)return;
  editingId=ev.id;
  document.getElementById('modal-title').textContent='Edit Entry';
  document.getElementById('del-btn').style.display='';document.getElementById('del-btn').disabled=false;
  document.getElementById('entry-type').value=ev.entry_type;
  document.getElementById('entry-office').value=ev.office||OFFICES[0].id;
  document.getElementById('entry-name').value=ev.entry_name||'';
  document.getElementById('entry-backup').value=ev.backup||'';
  document.getElementById('entry-forward').value=ev.forward_to||'';
  document.getElementById('entry-holiday-name').value=ev.holiday_name||'';
  document.getElementById('entry-date').value=ev.entry_date||'';
  document.getElementById('entry-end-date').value=ev.end_date||'';
  document.getElementById('entry-note').value=ev.note||'';
  document.getElementById('save-btn').disabled=false;
  setHalf(!!ev.half_day);syncForm();
  document.getElementById('event-modal').classList.add('open');
}
function populateOfficeSelect(){const sel=document.getElementById('entry-office');sel.innerHTML='';OFFICES.forEach(o=>{const opt=document.createElement('option');opt.value=o.id;opt.textContent=o.name;sel.appendChild(opt);});}

document.getElementById('save-btn').addEventListener('click',async()=>{
  const type=document.getElementById('entry-type').value,date=document.getElementById('entry-date').value;
  if(!date){alert('Please select a date.');return;}
  const payload={entry_type:type,office:type==='holiday'?'all':document.getElementById('entry-office').value,entry_date:date,end_date:document.getElementById('entry-end-date').value||null,entry_name:type!=='holiday'?document.getElementById('entry-name').value.trim():null,holiday_name:type==='holiday'?document.getElementById('entry-holiday-name').value.trim():null,backup:type==='employee-off'?document.getElementById('entry-backup').value.trim()||null:null,forward_to:type==='employee-off'?document.getElementById('entry-forward').value.trim()||null:null,half_day:halfActive,note:document.getElementById('entry-note').value.trim()||null};
  document.getElementById('save-btn').disabled=true;showSaving('Saving…');closeAll();
  try{if(editingId){await updateEvent(editingId,payload);}else{await createEvent(payload);}showSaving('Saved ✓','success');}
  catch(err){console.error(err);showSaving('Save failed','error');document.getElementById('save-btn').disabled=false;}
});
document.getElementById('del-btn').addEventListener('click',async()=>{
  if(!editingId)return;document.getElementById('del-btn').disabled=true;showSaving('Deleting…');closeAll();
  try{await deleteEvent(editingId);editingId=null;showSaving('Deleted ✓','success');}
  catch(err){console.error(err);showSaving('Delete failed','error');document.getElementById('del-btn').disabled=false;}
});
document.getElementById('cancel-btn').addEventListener('click',closeAll);
document.querySelectorAll('.modal-overlay').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)closeAll();}));
document.getElementById('add-btn').addEventListener('click',()=>openAdd());

// ── Nav ────────────────────────────────────────────────────────
document.getElementById('prev-btn').addEventListener('click',()=>{
  if(curView==='week'){weekStart=new Date(weekStart);weekStart.setDate(weekStart.getDate()-7);}
  else if(curView==='month'){curMonth--;if(curMonth<0){curMonth=11;curYear--;}}
  renderView();
});
document.getElementById('next-btn').addEventListener('click',()=>{
  if(curView==='week'){weekStart=new Date(weekStart);weekStart.setDate(weekStart.getDate()+7);}
  else if(curView==='month'){curMonth++;if(curMonth>11){curMonth=0;curYear++;}}
  renderView();
});
document.getElementById('today-nav-btn').addEventListener('click',()=>{
  curYear=today.getFullYear();curMonth=today.getMonth();weekStart=getMondayOf(today);
  curView='today';document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));document.querySelector('[data-view="today"]').classList.add('active');
  renderView();
});
document.getElementById('week-btn').addEventListener('click',()=>{
  weekStart=getMondayOf(today);curView='week';
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));document.querySelector('[data-view="week"]').classList.add('active');
  renderView();
});
document.querySelectorAll('.view-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');curView=btn.dataset.view;renderView();});
});

// ── Init ───────────────────────────────────────────────────────
(async()=>{
  try{
    document.getElementById('loading-msg').textContent='Loading calendar…';
    await loadEvents();populateOfficeSelect();renderLegend();renderView();subscribeRealtime();
    document.getElementById('loading-overlay').style.display='none';
    document.getElementById('wo-date').textContent=today.toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'});
    renderWhoPanel(todayKey);
    document.getElementById('day-add-btn').style.display='';
    document.getElementById('day-add-btn').onclick=()=>openAdd(todayKey);
  }catch(err){
    console.error(err);
    document.getElementById('loading-msg').textContent='Failed to connect. Please refresh and try again.';
  }
})();
</script>
</body>
</html>
